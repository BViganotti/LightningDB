repo_path: .
opencode_serve_url: http://localhost:4096
max_retries: 3
parallel_workers: 3
tmux_enabled: true
dashboard_enabled: true
dashboard_port: 8420
analyst:
  enabled: true
  target_paths:
    - .
  min_severity: medium
memory:
  lightning_path: .aer/lightning
worktree:
  base_dir: .aer/worktrees
verification:
  lint: true
  typecheck: true
  unit_tests: true
  integration_tests: false
pr:
  auto_create: false
  auto_merge: false
  target_branch: main
policies:
  constitution_path: constitution/
  enforce_architectural_rules: false
logging:
  level: INFO
  event_log_path: .aer/events.log
