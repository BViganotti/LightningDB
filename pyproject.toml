[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "lightning-memory"
requires-python = ">=3.9"
description = "Embedded graph+vector+hybrid database for AI agent memory"
authors = [{ name = "Lightning Developers" }]
license = { text = "MIT" }
readme = "README.md"

[tool.maturin]
features = ["pyo3/extension-module"]
module-name = "lightning"
