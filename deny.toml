# cargo-deny configuration for LightningDB.
# Run with: cargo deny check --all-features
[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"
ignore = []

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
]
deny = []
confidence = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
skip = [
    # tokio-util 0.6 is pulled in by h2; 0.7 is used by tonic.
    # Both are compatible and required by transitive deps.
    { name = "tokio-util", version = "0.6" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
