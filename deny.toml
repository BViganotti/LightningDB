[graph]
all-features = true
no-default-features = false

[advisories]
ignore = [
    # bincode 1.3.3 — development ceased, but the maintainers consider it
    # a complete version not in need of updates. Used only for cold-path
    # metadata serialization (database header + free space map).
    # Migration to a maintained alternative (postcard, rkyv) is tracked
    # as a separate task.
    "RUSTSEC-2025-0141",
    # rustls-pemfile — unmaintained, repository archived. Transitive
    # dependency via axum-server. Will resolve when axum-server updates
    # to use rustls-pki-types directly.
    "RUSTSEC-2025-0134",
]

[licenses]
allow = [
    "BUSL-1.1",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
skip = [
    { name = "hashbrown", version = "0.15" },
    { name = "getrandom", version = "0.2" },
    { name = "windows-sys", version = "0.52" },
    { name = "r-efi", version = "5.3" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
