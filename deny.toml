[graph]
all-features = false
no-default-features = false
feature-depth = 1

[output]
feature-depth = 1

[advisories]
vulnerability = "deny"
unmaintained = "deny"
unsound = "deny"
yanked = "deny"
ignore = []

[licenses]
allow-osi-fsf-free = "neither"
confidence-threshold = 0.93
unlicensed = "warn"

copyleft = "deny"

allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]

exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

allow = []
deny = [
    { name = "openssl-sys", wrappers = [] },
]

skip = []

skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
